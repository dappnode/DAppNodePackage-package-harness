version: "3.5"
services:
  package-harness:
    build:
      context: .
      dockerfile: Dockerfile
    image: package-harness.dnp.dappnode.eth:0.1.0
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATA_DIR: /data
      HARNESS_DNP_NAME: package-harness.dnp.dappnode.eth
      PACKAGE_MANAGER_MODE: mcp
      DAPPMANAGER_MCP_URL: ""
      DAPPMANAGER_MCP_TOKEN: ""
      MCP_TIMEOUT_MS: "30000"
      MCP_MUTATION_TIMEOUT_MS: "1800000"
      ALLOW_DESTRUCTIVE_PACKAGE_TESTS: "false"
      TROPIBOT_URL: ""
      PACKAGE_HARNESS_WORKER_ID: ""
      PACKAGE_HARNESS_WORKER_TOKEN: ""
      PACKAGE_HARNESS_POLL_SECONDS: "10"
      PACKAGE_HARNESS_HEARTBEAT_SECONDS: "20"
      NEXUS_API_KEY: ""
      NEXUS_MODEL: nexus/auto
      RUST_LOG: dappnode_package_harness=info,tower_http=info
    expose:
      - "8080"
    volumes:
      - data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
volumes:
  data: {}
