version: "2"
fields:
  - id: tropibot-url
    target:
      type: environment
      name: TROPIBOT_URL
      service: package-harness
    title: Tropibot URL
    description: >-
      HTTPS base URL for the trusted Tropibot coordinator. The harness polls it
      outbound, so it does not need a publicly reachable job-submission API.
    pattern: "^https://.+$"
    patternErrorMessage: Must be an HTTPS URL
    required: true

  - id: worker-id
    target:
      type: environment
      name: PACKAGE_HARNESS_WORKER_ID
      service: package-harness
    title: Worker ID
    description: >-
      Stable identifier for this dedicated disposable Dappnode worker, for
      example worker-01.
    pattern: "^[A-Za-z0-9._-]{1,128}$"
    required: true

  - id: worker-token
    target:
      type: environment
      name: PACKAGE_HARNESS_WORKER_TOKEN
      service: package-harness
    title: Tropibot worker token
    description: >-
      Shared bearer token for the small trusted v1 worker protocol. It can be
      replaced by per-worker credentials in a future protocol revision.
    secret: true
    required: true

  - id: dappmanager-mcp-url
    target:
      type: environment
      name: DAPPMANAGER_MCP_URL
      service: package-harness
    title: Dappmanager MCP URL
    description: >-
      The stateless Streamable HTTP MCP endpoint of this dedicated test Dappnode.
    required: true

  - id: dappmanager-mcp-token
    target:
      type: environment
      name: DAPPMANAGER_MCP_TOKEN
      service: package-harness
    title: Dappmanager MCP bearer token
    description: >-
      Bearer token authorized to use the required external read and mutation tools.
    secret: true
    required: true

  - id: poll-seconds
    target:
      type: environment
      name: PACKAGE_HARNESS_POLL_SECONDS
      service: package-harness
    title: Poll interval in seconds
    description: Time to wait after Tropibot reports no work. Default is 10 seconds.
    required: false

  - id: heartbeat-seconds
    target:
      type: environment
      name: PACKAGE_HARNESS_HEARTBEAT_SECONDS
      service: package-harness
    title: Heartbeat interval in seconds
    description: Frequency of progress and cancellation checks while a job is active. Default is 20 seconds.
    required: false

  - id: nexus-api-key
    target:
      type: environment
      name: NEXUS_API_KEY
      service: package-harness
    title: Nexus API key (optional)
    description: >-
      Enables one bounded advisory baseline-versus-candidate log analysis request.
      Deterministic container results never depend on Nexus.
    secret: true
    required: false

  - id: nexus-model
    target:
      type: environment
      name: NEXUS_MODEL
      service: package-harness
    title: Nexus model
    description: Optional Nexus model identifier. The default is nexus/auto.
    required: false
